<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ease-flip — EaseMotion CSS</title>
  <link rel="stylesheet" href="../../../easemotion.css" />
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      font-family: sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #f5f5f5;
      gap: 3rem;
      padding: 2rem;
    }
    h1 { color: #333; }
    .row { display: flex; gap: 2rem; flex-wrap: wrap; justify-content: center; }
    .label { font-size: 0.75rem; color: #888; text-align: center; margin-bottom: 0.5rem; }
    .section { display: flex; flex-direction: column; align-items: center; }
    .card {
      width: 200px;
      height: 120px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 1rem;
    }
    .front { background: #6366f1; color: #fff; }
    .back  { background: #ec4899; color: #fff; }
    .front-2 { background: #0f172a; color: #fff; }
    .back-2  { background: #22c55e; color: #fff; }
  </style>
</head>
<body>

  <h1>ease-flip Demo</h1>

  <div class="row">
    <div class="section">
      <div class="label">Hover to flip (Y axis)</div>
      <div class="ease-flip-container">
        <div class="ease-flip" style="width:200px;height:120px;">
          <div class="ease-flip-front card front">Front</div>
          <div class="ease-flip-back card back">Back</div>
        </div>
      </div>
    </div>

    <div class="section">
      <div class="label">Flip X axis</div>
      <div class="ease-flip-container">
        <div class="ease-flip ease-flip-x" style="width:200px;height:120px;">
          <div class="ease-flip-front card front-2">Front</div>
          <div class="ease-flip-back card back-2">Back</div>
        </div>
      </div>
    </div>

    <div class="section">
      <div class="label">Fast flip</div>
      <div class="ease-flip-container">
        <div class="ease-flip ease-flip-fast" style="width:200px;height:120px;">
          <div class="ease-flip-front card front">Fast</div>
          <div class="ease-flip-back card back">⚡</div>
        </div>
      </div>
    </div>

    <div class="section">
      <div class="label">Slow flip</div>
      <div class="ease-flip-container">
        <div class="ease-flip ease-flip-slow" style="width:200px;height:120px;">
          <div class="ease-flip-front card front-2">Slow</div>
          <div class="ease-flip-back card back-2">🐢</div>
        </div>
      </div>
    </div>
  </div>

  <div class="section">
    <div class="label">Click to flip</div>
    <div class="ease-flip-container">
      <div class="ease-flip ease-flip-click" id="clickCard" style="width:200px;height:120px;"
           onclick="this.classList.toggle('is-flipped')">
        <div class="ease-flip-front card front">Click me</div>
        <div class="ease-flip-back card back">Flipped! 🎉</div>
      </div>
    </div>
  </div>

</body>
</html>
